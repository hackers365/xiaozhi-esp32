name: Build Boards

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - ci/* # for ci test
    tags:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare:
    name: Determine variants to build
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.select.outputs.variants }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - id: list
        name: Get all variant list
        run: |
          echo "all_variants=$(python scripts/release.py --list-boards --json)" >> $GITHUB_OUTPUT

      - id: select
        name: Select variants based on changes
        env:
          ALL_VARIANTS: ${{ steps.list.outputs.all_variants }}
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"

          # push / workflow_dispatch 场景（分支、tag 或手动触发）编译全部变体
          if [[ "$EVENT_NAME" == "push" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "variants=$ALL_VARIANTS" >> $GITHUB_OUTPUT
            exit 0
          fi

          # pull_request 场景
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Base: $BASE_SHA, Head: $HEAD_SHA"

          CHANGED=$(git diff --name-only $BASE_SHA $HEAD_SHA || true)
          echo -e "Changed files:\n$CHANGED"

          NEED_ALL=0
          declare -A AFFECTED
          mapfile -t KNOWN_BOARDS < <(echo "$ALL_VARIANTS" | jq -r '.[].board' | sort -u)

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            if [[ "$file" == main/* && "$file" != main/boards/* ]]; then
              NEED_ALL=1
            fi

            if [[ "$file" == main/boards/common/* ]]; then
              NEED_ALL=1
            fi

            if [[ "$file" == main/boards/* ]]; then
              for board in "${KNOWN_BOARDS[@]}"; do
                if [[ "$file" == "main/boards/$board" || "$file" == "main/boards/$board/"* ]]; then
                  AFFECTED[$board]=1
                  break
                fi
              done
            fi
          done <<< "$CHANGED"

          if [[ "$NEED_ALL" -eq 1 ]]; then
            echo "variants=$ALL_VARIANTS" >> $GITHUB_OUTPUT
          else
            if [[ ${#AFFECTED[@]} -eq 0 ]]; then
              echo "variants=[]" >> $GITHUB_OUTPUT
            else
              BOARDS_JSON=$(printf '%s\n' "${!AFFECTED[@]}" | sort -u | jq -R -s -c 'split("\n")[:-1]')
              FILTERED=$(echo "$ALL_VARIANTS" | jq -c --argjson boards "$BOARDS_JSON" 'map(select(.board as $b | $boards | index($b)))')
              echo "variants=$FILTERED" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    name: Build ${{ matrix.full_name }}
    needs: prepare
    if: ${{ needs.prepare.outputs.variants != '[]' }}
    strategy:
      fail-fast: false  # 单个变体失败不影响其它变体
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.variants) }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build current variant
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          python scripts/release.py ${{ matrix.board }} --name ${{ matrix.name }}

      - name: Upload packaged firmware
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_${{ matrix.full_name }}_${{ github.sha }}
          path: releases/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    if: ${{ startsWith(github.ref, 'refs/tags/') && needs.prepare.outputs.variants != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged firmware
        uses: actions/download-artifact@v4
        with:
          pattern: xiaozhi_*
          path: release-assets
          merge-multiple: true

      - name: Create or update release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-assets/*.zip)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found"
            exit 1
          fi

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --clobber
